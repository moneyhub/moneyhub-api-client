# Publish to npm with provenance (verified checkmark + attestations).
#
# Prerequisites:
# 0. Node 22.14.0+ and npm 11.5.1+ (required for OIDC trusted publishing; see steps below).
# 1. On npmjs.com: Package → Settings → Trusted publishing → Add GitHub Actions
#    - Workflow filename: publish.yml
#    - Repository: owner/repo that matches this repo (case-sensitive)
#    - Environment name: leave blank, or use "npm" if you use the environment below
# 2. Optional: Create GitHub Environment "npm" (Settings → Environments) for approval gates.
# 3. package.json "repository" must match the GitHub repo (case-sensitive).
#
# Pre-releases: mark the GitHub release as "Set as a pre-release" so the workflow
# publishes with dist-tag `beta` (npm install @scope/pkg@beta). Stable releases use the default tag.
#
# After publish, consumers can verify attestations with:
#   npm audit signatures
name: Publish to npm

on:
  release:
    types: [published]
  # Alternative: publish on version tags (e.g. git tag v6.96.0)
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: read
  id-token: write   # Required for npm trusted publishing (OIDC)
  checks: write     # Required for moneyhub/run-and-report-tests (Check Runs API)

jobs:
  publish:
    name: Test, Build and publish
    runs-on: ubuntu-latest
    # Single run per release: npm allows one publish per version. A matrix over
    # environments would run publish multiple times and the second job would fail.
    # Optional: add `environment: npm` (or another single environment) for approval
    # gates — see header comments.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "22.22"

      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Run Tests
        shell: bash
        run: npm run test-ci
        env:
          NODE_CONFIG: ${{ secrets.TEST_CONFIG }}

      - name: Tests Report
        if: success() || failure()
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4.3.1
        with:
          report_paths: test-reports/report.xml
          fail_on_failure: true
          detailed_summary: true
          check_name: Test Report
          require_tests: true
          require_passed_tests: false
        env:
          NODE_CONFIG: ${{ secrets.TEST_CONFIG }}

      # Publish auth: npm 11.5.1+ exchanges GitHub's OIDC token (id-token: write) for a
      # short-lived publish token when trusted publishing is configured. No NODE_AUTH_TOKEN
      # is required for publish. Provenance is automatic for trusted publishing from GitHub
      # Actions on public repos (verified checkmark + npm audit signatures).
      - name: Publish to npm (stable)
        if: ${{ !github.event.release.prerelease }}
        run: npm publish --provenance --access public
      - name: Publish to npm (beta)
        if: ${{ github.event.release.prerelease }}
        run: npm publish --provenance --access public --tag beta